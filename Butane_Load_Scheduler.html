<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Butane Load Scheduler – March 2026</title>
<style>
:root {
  --bg:#1a1a2e; --card:#16213e; --accent:#0f3460;
  --teal:#4caf9e; --gold:#f0a500; --red:#ff4444; --orange:#ff6b35;
  --text:#e0e0e0; --muted:#888; --border:#2a3a5c;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif;min-height:100vh;}
h1{text-align:center;padding:16px;color:var(--teal);font-size:1.4em;letter-spacing:1px;}

/* Site tabs */
.site-tabs{display:flex;flex-wrap:wrap;gap:6px;padding:0 16px 12px;justify-content:center;}
.site-tab{background:var(--accent);border:1px solid var(--border);border-radius:8px;padding:8px 16px;cursor:pointer;font-size:.85em;transition:all .2s;color:var(--muted);}
.site-tab.active{background:var(--teal);color:#000;font-weight:700;border-color:var(--teal);}

/* Summary bar */
.summary-bar{background:var(--accent);border-radius:8px;margin:0 12px 8px;padding:10px 16px;font-size:.83em;display:flex;gap:20px;flex-wrap:wrap;align-items:center;}
.summary-bar .stat{color:var(--muted);}
.summary-bar .stat span{color:var(--text);font-weight:700;}
.summary-bar .stat.warn span{color:var(--red);}
.summary-bar .stat.ok span{color:var(--teal);}

/* Week nav */
.week-nav{display:flex;align-items:center;justify-content:center;gap:12px;padding:8px;}
.week-nav button{background:var(--accent);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:6px 14px;cursor:pointer;font-size:.9em;}
.week-nav button:hover{background:var(--teal);color:#000;}
.week-label{font-size:.9em;color:var(--muted);min-width:220px;text-align:center;}

/* Day cards */
.day-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;padding:0 12px 12px;}
.day-card{background:var(--card);border:2px solid var(--border);border-radius:10px;padding:10px 8px;cursor:pointer;transition:all .2s;position:relative;min-height:110px;}
.day-card:hover{border-color:var(--teal);transform:translateY(-2px);}
.day-card.today{border-color:var(--gold)!important;}
.day-card.selected{border-color:var(--teal)!important;background:#1a2f4a;}
.day-card.at-capacity{border-color:var(--red)!important;}
.day-name{font-size:.7em;color:var(--muted);margin-bottom:2px;}
.day-date{font-size:.92em;font-weight:700;margin-bottom:5px;}
.day-date.today-lbl{color:var(--gold);}
.level-bar-wrap{height:6px;background:#0a0a1a;border-radius:3px;overflow:hidden;margin-bottom:4px;}
.level-bar{height:100%;border-radius:3px;transition:width .3s;}
.day-stats{font-size:.72em;color:var(--muted);line-height:1.5;}
.day-stats span{color:var(--text);}
.day-stats .burn-rate{color:#a0c4ff;}
.badge-wrap{position:absolute;top:5px;right:5px;display:flex;flex-direction:column;gap:2px;align-items:flex-end;}
.load-badge{background:var(--teal);color:#000;border-radius:10px;font-size:.62em;font-weight:700;padding:1px 6px;}
.full-badge{background:var(--red);color:#fff;border-radius:10px;font-size:.6em;font-weight:700;padding:1px 5px;}

/* Detail panel */
.detail-panel{background:var(--card);border:1px solid var(--border);border-radius:12px;margin:0 12px 16px;padding:16px;display:none;}
.detail-panel.visible{display:block;}
.detail-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;flex-wrap:wrap;gap:10px;}
.detail-title{font-size:1.1em;font-weight:700;}
.detail-actions{display:flex;gap:8px;flex-wrap:wrap;}
.btn{padding:7px 14px;border-radius:7px;border:none;cursor:pointer;font-size:.82em;font-weight:600;transition:all .2s;}
.btn-teal{background:var(--teal);color:#000;}
.btn-teal:hover{background:#3d9e8e;}
.btn-gold{background:var(--gold);color:#000;}
.btn-gold:hover{background:#d4911a;}
.btn-muted{background:var(--accent);color:var(--text);border:1px solid var(--border);}
.btn-muted:hover{background:var(--border);}

/* Burn rate editor */
.burn-editor{
  background:#0f2040; border:1px solid var(--border); border-radius:9px;
  padding:10px 14px; margin-bottom:14px;
  display:flex; align-items:center; flex-wrap:wrap; gap:12px;
}
.burn-editor label{font-size:.82em;color:var(--muted);}
.burn-editor .burn-inputs{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.burn-input-group{display:flex;align-items:center;gap:5px;background:var(--accent);border:1px solid var(--border);border-radius:7px;padding:4px 10px;}
.burn-input-group span{font-size:.78em;color:var(--muted);}
.burn-input{background:transparent;border:none;color:var(--teal);font-size:.95em;font-weight:700;width:70px;text-align:right;outline:none;}
.burn-input:focus{color:#fff;}
.burn-unit{font-size:.78em;color:var(--muted);margin-left:2px;}
.burn-reset{background:none;border:1px solid var(--border);border-radius:5px;color:var(--muted);font-size:.75em;padding:3px 8px;cursor:pointer;}
.burn-reset:hover{color:var(--text);border-color:var(--text);}
.burn-override-note{font-size:.75em;color:var(--gold);display:none;}
.burn-override-note.visible{display:inline;}

/* Capacity alert bar */
.capacity-bar{
  border-radius:8px; padding:8px 12px; margin-bottom:12px;
  font-size:.82em; display:none; align-items:center; gap:8px;
}
.capacity-bar.visible{display:flex;}
.capacity-bar.warn{background:#3a1a0a;border:1px solid var(--orange);color:var(--orange);}
.capacity-bar.full{background:#2a0a0a;border:1px solid var(--red);color:var(--red);}

/* Hour table */
.hour-table{width:100%;border-collapse:collapse;font-size:.81em;}
.hour-table th{background:var(--accent);padding:6px 8px;text-align:center;color:var(--muted);font-weight:600;border-bottom:1px solid var(--border);}
.hour-table td{padding:5px 8px;border-bottom:1px solid #1a2a40;text-align:center;vertical-align:middle;}
.hour-table tr:hover td{background:#1e2d4a;}
.level-cell{font-weight:700;}
.change-cell{font-size:.8em;}
.bar-cell{width:100px;}
.mini-bar-wrap{height:14px;background:#0a0a1a;border-radius:3px;overflow:hidden;position:relative;}
.mini-bar{height:100%;border-radius:3px;}
.mini-bar-wrap .cap-line{position:absolute;top:0;bottom:0;width:2px;background:var(--red);opacity:.7;}
.action-cell{min-width:120px;}
.add-btn{background:var(--teal);color:#000;border:none;border-radius:5px;padding:3px 11px;cursor:pointer;font-size:.8em;font-weight:700;transition:all .2s;}
.add-btn:hover{background:#3d9e8e;}
.add-btn:disabled{background:#1a3a3a;color:#3a7a6a;cursor:not-allowed;border:1px dashed #3a7a6a;}
.remove-btn{background:var(--red);color:#fff;border:none;border-radius:5px;padding:3px 10px;cursor:pointer;font-size:.8em;font-weight:700;}
.remove-btn:hover{background:#cc2222;}
.hist-badge{background:#1a4a3a;color:var(--teal);border-radius:4px;padding:2px 8px;font-size:.8em;font-weight:700;}
.drv-name{display:inline-block;margin-left:6px;font-size:.75rem;color:#aef;font-weight:600;white-space:nowrap;}
.drv-input{background:transparent;border:none;border-bottom:1px solid #4a7aaf;color:#aef;font-size:.75rem;font-weight:600;width:110px;margin-left:6px;padding:1px 2px;outline:none;}
.drv-input::placeholder{color:#556;font-weight:400;}
.drv-input:focus{border-bottom-color:#6ab4ff;color:#ddf;}
.plan-badge{background:#1a3a5a;color:#6ab4ff;border-radius:4px;padding:2px 8px;font-size:.8em;font-weight:700;}
.conflict-badge{background:#4a2a00;color:#ffaa33;border-radius:4px;padding:2px 8px;font-size:.78em;font-weight:700;margin-left:6px;}
.block-reason{font-size:.72em;color:var(--orange);display:block;margin-top:2px;}
.warn-row td{color:var(--red)!important;}
.over-row td{background:#2a1010!important;}
.time-cell{color:var(--muted);font-size:.85em;}
.cap-pct{font-size:.75em;color:var(--muted);}

/* Legend */
.legend{display:flex;flex-wrap:wrap;gap:8px;padding:8px 12px;font-size:.75em;}
.legend-item{display:flex;align-items:center;gap:4px;}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.data-note{text-align:center;font-size:.72em;color:var(--muted);padding:4px 0 12px;}

/* Tooltip */
[data-tip]{position:relative;}
[data-tip]:hover::after{
  content:attr(data-tip);
  position:absolute;bottom:110%;left:50%;transform:translateX(-50%);
  background:#000;color:#fff;font-size:.75em;white-space:nowrap;
  border-radius:5px;padding:4px 8px;pointer-events:none;z-index:100;
  border:1px solid var(--border);
}
</style>
</head>

// ── Constants ────────────────────────────────────────
const MONTH_DATES = ['Mar 1', 'Mar 2', 'Mar 3', 'Mar 4', 'Mar 5', 'Mar 6', 'Mar 7', 'Mar 8', 'Mar 9', 'Mar 10', 'Mar 11', 'Mar 12', 'Mar 13', 'Mar 14', 'Mar 15', 'Mar 16', 'Mar 17', 'Mar 18', 'Mar 19', 'Mar 20', 'Mar 21', 'Mar 22', 'Mar 23', 'Mar 24', 'Mar 25', 'Mar 26', 'Mar 27', 'Mar 28', 'Mar 29', 'Mar 30', 'Mar 31', 'Apr 1', 'Apr 2', 'Apr 3', 'Apr 4', 'Apr 5', 'Apr 6', 'Apr 7', 'Apr 8', 'Apr 9', 'Apr 10', 'Apr 11', 'Apr 12', 'Apr 13', 'Apr 14', 'Apr 15', 'Apr 16', 'Apr 17', 'Apr 18', 'Apr 19', 'Apr 20', 'Apr 21', 'Apr 22', 'Apr 23', 'Apr 24', 'Apr 25', 'Apr 26', 'Apr 27', 'Apr 28', 'Apr 29', 'Apr 30', 'May 1', 'May 2', 'May 3', 'May 4', 'May 5', 'May 6', 'May 7', 'May 8', 'May 9', 'May 10', 'May 11', 'May 12', 'May 13', 'May 14', 'May 15', 'May 16', 'May 17', 'May 18', 'May 19', 'May 20', 'May 21', 'May 22', 'May 23', 'May 24', 'May 25', 'May 26', 'May 27', 'May 28', 'May 29', 'May 30', 'May 31'];
const TODAY = "Mar 29";
const TODAY_IDX = MONTH_DATES.indexOf(TODAY);
const DAY_NAMES = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
function dlToAbsDay(dl) {
  const [m,d] = dl.split(" ");
  const n = parseInt(d);
  if (m==="Mar") return n;
  if (m==="Apr") return 31+n;
  if (m==="May") return 61+n;
  return n;
}
// March 1 2026 = Sunday (index 0); formula: (absDay-1) % 7
function getDayName(dl) { return DAY_NAMES[(dlToAbsDay(dl)-1) % 7]; }

// ── Mutable state ────────────────────────────────────
let activeSite = "CCL";
let weekStart = Math.max(0, TODAY_IDX - 3);
let selectedDate = TODAY;
let plannedLoads   = {};    // {siteKey: {dateLabel: {hr: amt}}}
let plannedDrivers = {};    // {siteKey: {dateLabel: {hr: driverName}}}
let burnOverrides  = {};    // {siteKey: {dateLabel: hourlyRate}}

// ── Data accessors ───────────────────────────────────
function getEmbed(sk, dl) { return (EMBEDDED_DATA[sk]||{})[dl]||null; }

function getBurnRate(sk, dl) {
  // User override takes priority
  if (burnOverrides[sk] && burnOverrides[sk][dl] != null) return burnOverrides[sk][dl];
  const e = getEmbed(sk, dl);
  if (e && e.br > 0) return e.br;
  // Fall back to nearest previous day's rate
  const idx = MONTH_DATES.indexOf(dl);
  for (let i = idx-1; i >= 0; i--) {
    const prev = getEmbed(sk, MONTH_DATES[i]);
    if (prev && prev.br > 0) return prev.br;
  }
  return 5;
}

function setBurnRate(sk, dl, hrRate) {
  if (!burnOverrides[sk]) burnOverrides[sk] = {};
  if (hrRate === null) { delete burnOverrides[sk][dl]; }
  else { burnOverrides[sk][dl] = hrRate; }
  renderAll();
}

function getHistLoads(sk, dl) { const e=getEmbed(sk,dl); return e&&e.loads ? e.loads : {}; }
function getPlanLoads(sk, dl) { return ((plannedLoads[sk]||{})[dl])||{}; }

function getStartLevel(sk, dl) {
  const e = getEmbed(sk, dl);
  if (e && e.lv !== null) return e.lv;
  // Simulate from previous day's end
  const idx = MONTH_DATES.indexOf(dl);
  if (idx <= 0) return null;
  return getLevelAt(sk, MONTH_DATES[idx-1], 23);
}

function getLevelAt(sk, dl, hr) {
  const start = getStartLevel(sk, dl);
  if (start === null) return null;
  const br = getBurnRate(sk, dl);
  let lv = start - br * hr;
  for (const [h,a] of Object.entries(getHistLoads(sk,dl))) { if (parseInt(h)<=hr) lv+=parseFloat(a); }
  for (const [h,a] of Object.entries(getPlanLoads(sk,dl)))  { if (parseInt(h)<=hr) lv+=parseFloat(a); }
  return Math.round(lv * 10) / 10;
}

// ── Capacity check ───────────────────────────────────
function getBulletConflict(sk, dl, hr) {
  if (!SITES[sk].singleBullet) return null;
  const allLoads = {...getHistLoads(sk, dl), ...getPlanLoads(sk, dl)};
  for (const h of Object.keys(allLoads)) {
    const hInt = parseInt(h);
    if (hInt !== hr && Math.abs(hr - hInt) < 3) return hInt;
  }
  return null;
}

function checkAddLoad(sk, dl, hr) {
  const site = SITES[sk];
  // Single-bullet check: loads must be at least 3 hrs apart
  if (site.singleBullet) {
    const conflictHr = getBulletConflict(sk, dl, hr);
    if (conflictHr !== null) {
      return {
        ok: false,
        reason: `1-bullet plant — load at ${String(conflictHr).padStart(2,'0')}:00 is within 3 hrs`,
        conflict: true
      };
    }
  }
  let peakLv = -Infinity;
  let peakHr = hr;
  for (let h = hr; h < 24; h++) {
    const cur = getLevelAt(sk, dl, h) + site.loadSize;
    if (cur > peakLv) { peakLv = cur; peakHr = h; }
  }
  if (peakLv > site.highLevel) {
    return {
      ok: false,
      reason: `Would reach ${peakLv.toFixed(1)} m³ at ${String(peakHr).padStart(2,'0')}:00 (limit ${site.highLevel} m³)`,
      peakLv
    };
  }
  return { ok: true, reason: null, peakLv };
}

function getDayPeak(sk, dl) {
  let peak = -Infinity;
  for (let h = 0; h < 24; h++) {
    const lv = getLevelAt(sk, dl, h);
    if (lv !== null && lv > peak) peak = lv;
  }
  return peak === -Infinity ? null : peak;
}

function isAtCapacity(sk, dl) {
  const site = SITES[sk];
  const peak = getDayPeak(sk, dl);
  return peak !== null && peak >= site.highLevel * 0.97;
}

// ── Planned load management ──────────────────────────
function toggleLoad(dl, hr, delta) {
  if (!plannedLoads[activeSite]) plannedLoads[activeSite] = {};
  if (!plannedLoads[activeSite][dl]) plannedLoads[activeSite][dl] = {};
  if (!plannedDrivers[activeSite]) plannedDrivers[activeSite] = {};
  if (!plannedDrivers[activeSite][dl]) plannedDrivers[activeSite][dl] = {};
  const cur = plannedLoads[activeSite][dl][hr] || 0;
  const next = cur + delta;
  if (next <= 0) {
    delete plannedLoads[activeSite][dl][hr];
    delete plannedDrivers[activeSite][dl][hr];
  } else {
    // Cap at exactly one load (loadSize) — no stacking multiple loads on the same hour
    plannedLoads[activeSite][dl][hr] = SITES[activeSite].loadSize;
    // Prompt for driver name if not already set
    if (!plannedDrivers[activeSite][dl][hr]) {
      const name = window.prompt(`Driver name for ${dl} ${String(hr).padStart(2,'0')}:00? (optional)`);
      if (name && name.trim()) plannedDrivers[activeSite][dl][hr] = name.trim();
    }
  }
  renderAll();
}

function updatePlannedDriver(dl, hr, name) {
  if (!plannedDrivers[activeSite]) plannedDrivers[activeSite] = {};
  if (!plannedDrivers[activeSite][dl]) plannedDrivers[activeSite][dl] = {};
  if (name && name.trim()) {
    plannedDrivers[activeSite][dl][hr] = name.trim();
  } else {
    delete plannedDrivers[activeSite][dl][hr];
  }
}

function getTotalPlanLoads(sk) {
  if (!plannedLoads[sk]) return 0;
  return Object.values(plannedLoads[sk]).reduce((s,d)=>s+Object.keys(d).length,0);
}

// ── Zone helpers ─────────────────────────────────────
function getZone(site, lv) {
  for (const z of site.zones) if (lv <= z.max) return z;
  return site.zones[site.zones.length-1];
}
function zoneColor(site, lv) { return getZone(site, lv).color; }

// ── Auto-schedule ────────────────────────────────────
function autoSchedule() {
  const site = SITES[activeSite];
  for (const dl of MONTH_DATES.slice(TODAY_IDX+1)) {
    let hr = 6;
    while (hr <= 20) {
      const chk = checkAddLoad(activeSite, dl, hr);
      if (chk.ok) {
        toggleLoad(dl, hr, site.loadSize);
        // For single-bullet sites, next truck can't arrive for 3 hrs
        hr += site.singleBullet ? 3 : 1;
      } else if (chk.conflict) {
        // Bullet is occupied — skip ahead to avoid the conflict
        hr++;
      } else {
        hr++;
      }
    }
  }
  renderAll();
}

// ── Render helpers ───────────────────────────────────
function pct(lv, absMax) { return Math.min(100, Math.max(0, lv/absMax*100)).toFixed(1); }

function renderSiteTabs() {
  document.getElementById("siteTabs").innerHTML =
    Object.values(SITES).map(s =>
      `<div class="site-tab ${s.key===activeSite?'active':''}" onclick="selectSite('${s.key}')">${s.name}</div>`
    ).join("");
}

function renderLegend() {
  const site = SITES[activeSite];
  document.getElementById("zoneLegend").innerHTML =
    site.zones.map(z =>
      `<div class="legend-item"><div class="legend-dot" style="background:${z.color}"></div><span>${z.label}</span></div>`
    ).join("");
}

function renderSummary() {
  const site = SITES[activeSite];
  const hr = new Date().getHours();
  const lv = getLevelAt(activeSite, TODAY, hr);
  const br = getBurnRate(activeSite, TODAY);
  const capPct = lv !== null ? (lv/site.absMax*100).toFixed(0) : null;

  document.getElementById("sumSite").textContent = site.name;
  document.getElementById("sumLevel").textContent = lv !== null ? `${lv.toFixed(1)} m³ (${capPct}%)` : "—";
  document.getElementById("sumBurnHr").textContent = br.toFixed(1);
  document.getElementById("sumBurnDay").textContent = (br*24).toFixed(0);
  document.getElementById("sumPlanned").textContent = getTotalPlanLoads(activeSite);
  document.getElementById("sumHigh").textContent = site.highLevel;

  const lvStat = document.getElementById("sumLevelStat");
  if (lv !== null) {
    const zone = getZone(site, lv);
    lvStat.querySelector("span").style.color = zone.color;
  }

  const capStat = document.getElementById("sumCapStat");
  if (lv !== null && lv >= site.highLevel * 0.9) {
    capStat.style.display = "";
    document.getElementById("sumCap").textContent =
      lv >= site.highLevel ? "Tank at/above high level!" : "Approaching high level";
  } else {
    capStat.style.display = "none";
  }
}

function renderWeekNav() {
  const s = MONTH_DATES[weekStart];
  const e = MONTH_DATES[Math.min(weekStart+6, MONTH_DATES.length-1)];
  document.getElementById("weekLabel").textContent = s + " – " + e;
}

function renderDayGrid() {
  const site = SITES[activeSite];
  const visible = MONTH_DATES.slice(weekStart, weekStart+7);
  document.getElementById("dayGrid").innerHTML = visible.map(dl => {
    const startLv = getLevelAt(activeSite, dl, 0);
    const endLv   = getLevelAt(activeSite, dl, 23);
    const peak    = getDayPeak(activeSite, dl);
    const br      = getBurnRate(activeSite, dl);
    const p = startLv !== null ? pct(startLv, site.absMax) : 0;
    const col = startLv !== null ? zoneColor(site, startLv) : "#444";
    const isToday = dl===TODAY, isSel = dl===selectedDate;
    const hist = Object.keys(getHistLoads(activeSite,dl)).length;
    const plan = Object.keys(getPlanLoads(activeSite,dl)).length;
    const atCap = isAtCapacity(activeSite, dl);
    const overHigh = peak !== null && peak >= site.highLevel;

    return `
      <div class="day-card ${isToday?'today':''} ${isSel?'selected':''} ${overHigh?'at-capacity':''}"
           onclick="selectDate('${dl}')">
        <div class="day-name">${getDayName(dl)}</div>
        <div class="day-date ${isToday?'today-lbl':''}">${dl}${isToday?' ★':''}</div>
        <div class="level-bar-wrap">
          <div class="level-bar" style="width:${p}%;background:${col}"></div>
        </div>
        <div class="day-stats">
          Start: <span>${startLv!==null?startLv.toFixed(0):'—'}</span> m³<br>
          End: <span style="color:${endLv!==null?zoneColor(site,endLv):'#888'}">${endLv!==null?endLv.toFixed(0):'—'}</span> m³<br>
          <span class="burn-rate">🔥 ${br.toFixed(2)} m³/hr · ${(br*24).toFixed(1)} m³/day${burnOverrides[activeSite]&&burnOverrides[activeSite][dl]!=null?' ✎':''}</span>
        </div>
        <div class="badge-wrap">
          ${(hist+plan)>0 ? `<div class="load-badge">${hist+plan}🚚</div>` : ''}
          ${overHigh ? `<div class="full-badge">⛔ FULL</div>` : (atCap ? `<div class="full-badge" style="background:var(--orange)">≈ FULL</div>` : '')}
        </div>
      </div>`;
  }).join("");
}

function renderDetailPanel() {
  const panel = document.getElementById("detailPanel");
  if (!selectedDate) { panel.className="detail-panel"; return; }
  panel.className = "detail-panel visible";

  const site = SITES[activeSite];
  const dl = selectedDate;
  const br = getBurnRate(activeSite, dl);
  const brDay = (br*24).toFixed(1);
  const hasOverride = burnOverrides[activeSite] && burnOverrides[activeSite][dl] != null;
  const startLv = getStartLevel(activeSite, dl);
  const peak = getDayPeak(activeSite, dl);
  const histLoads = getHistLoads(activeSite, dl);
  const planLoads = getPlanLoads(activeSite, dl);
  const overHigh = peak !== null && peak >= site.highLevel;
  const nearHigh = peak !== null && peak >= site.highLevel * 0.9 && !overHigh;

  let capHtml = '';
  if (overHigh) {
    capHtml = `<div class="capacity-bar full visible">⛔ Tank is at or above high level (${site.highLevel} m³) — no further loads can be added this day. Peak: ${peak!==null?peak.toFixed(1):'—'} m³</div>`;
  } else if (nearHigh) {
    capHtml = `<div class="capacity-bar warn visible">⚠ Tank is approaching the high level (${site.highLevel} m³). Some hours may not accept more loads. Peak: ${peak!==null?peak.toFixed(1):'—'} m³</div>`;
  }

  let rows = '';
  for (let hr = 0; hr < 24; hr++) {
    const lv = getLevelAt(activeSite, dl, hr);
    const prevLv = hr===0 ? startLv : getLevelAt(activeSite, dl, hr-1);
    const chg = lv!==null && prevLv!==null ? lv-prevLv : null;
    const col = lv!==null ? zoneColor(site,lv) : '#888';
    const p = lv!==null ? pct(lv, site.absMax) : 0;
    const capLinePct = (site.highLevel/site.absMax*100).toFixed(1);
    const isOver = lv!==null && lv>site.highLevel;
    const isLow  = lv!==null && lv<site.safeLow;

    const hist = histLoads[hr];
    const plan = planLoads[hr];

    const chkResult = checkAddLoad(activeSite, dl, hr);
    let actionCell = '';
    if (hist) {
      const bulletConflict = getBulletConflict(activeSite, dl, hr);
      const conflictWarn = bulletConflict !== null
        ? `<span class="conflict-badge">⚠ Conflict: ${String(bulletConflict).padStart(2,'0')}:00 within 3 hrs</span>`
        : '';
      const drvMap = (getEmbed(activeSite,dl)||{}).drivers||{};
      const drvName = drvMap[hr] ? `<span class="drv-name">${drvMap[hr]}</span>` : '';
      actionCell = `<span class="hist-badge">+${hist}m³ ✓</span>${drvName}${conflictWarn}`;
    } else if (plan) {
      const bulletConflict = getBulletConflict(activeSite, dl, hr);
      const conflictWarn = bulletConflict !== null
        ? `<span class="conflict-badge">⚠ Conflict: ${String(bulletConflict).padStart(2,'0')}:00 within 3 hrs</span>`
        : '';
      const planDrvMap = (plannedDrivers[activeSite]||{})[dl]||{};
      const planDrvName = planDrvMap[hr] || '';
      actionCell = `
        <span class="plan-badge">+${plan}m³ 📋</span>
        <input class="drv-input" type="text" placeholder="Driver…" value="${planDrvName}"
          oninput="updatePlannedDriver('${dl}',${hr},this.value)" title="Driver name">
        ${conflictWarn}
        <button class="remove-btn" onclick="toggleLoad('${dl}',${hr},-${site.loadSize})">✕ Remove</button>`;
    } else if (chkResult.ok) {
      actionCell = `<button class="add-btn" onclick="toggleLoad('${dl}',${hr},${site.loadSize})">+ Add Load</button>`;
    } else {
      const isBulletBlock = chkResult.conflict;
      actionCell = `
        <button class="add-btn" disabled data-tip="${chkResult.reason}">${isBulletBlock ? '🚫 1-Bullet' : '⛔ Full'}</button>
        <span class="block-reason">${chkResult.reason}</span>`;
    }

    rows += `
      <tr class="${isOver?'over-row':''} ${isLow?'warn-row':''}">
        <td class="time-cell">${String(hr).padStart(2,'0')}:00</td>
        <td class="level-cell" style="color:${col}">${lv!==null?lv.toFixed(1):'—'}</td>
        <td class="cap-pct" style="color:${col}">${lv!==null?(lv/site.absMax*100).toFixed(0)+'%':'—'}</td>
        <td class="change-cell" style="color:${chg!==null?(chg>=0?'#4caf9e':'#ff8888'):'#888'}">
          ${chg!==null?(chg>=0?'+':'')+chg.toFixed(1):'—'}
        </td>
        <td class="bar-cell">
          <div class="mini-bar-wrap">
            <div class="mini-bar" style="width:${p}%;background:${col}"></div>
            <div class="cap-line" style="left:${capLinePct}%"></div>
          </div>
        </td>
        <td class="action-cell">${actionCell}</td>
      </tr>`;
  }

  panel.innerHTML = `
    <div class="detail-header">
      <div class="detail-title">📅 ${dl} — ${site.name}</div>
      <div class="detail-actions">
        <button class="btn btn-gold" onclick="autoSchedule()">⚡ Auto-Schedule Future</button>
        <button class="btn btn-muted" onclick="clearPlanned()">🗑 Clear Changes</button>
        <button class="btn btn-teal" onclick="exportCSV()">⬇ Export CSV</button>
      </div>
    </div>

    <div class="burn-editor">
      <label>🔥 Burn Rate for ${dl}:</label>
      <div class="burn-inputs">
        <div class="burn-input-group" data-tip="Edit hourly burn rate">
          <span>Hourly</span>
          <input class="burn-input" id="brHrInput" type="number" step="0.1" min="0" max="200"
            value="${br.toFixed(2)}"
            onchange="onBurnHrChange(this.value)"
            oninput="syncBurnDay(this.value)">
          <span class="burn-unit">m³/hr</span>
        </div>
        <div class="burn-input-group" data-tip="Edit daily burn rate">
          <span>Daily</span>
          <input class="burn-input" id="brDayInput" type="number" step="0.5" min="0" max="5000"
            value="${brDay}"
            onchange="onBurnDayChange(this.value)"
            oninput="syncBurnHr(this.value)">
          <span class="burn-unit">m³/day</span>
        </div>
        <button class="burn-reset" onclick="resetBurnRate('${dl}')" title="Reset to computed value">↺ Reset</button>
        <span class="burn-override-note ${hasOverride?'visible':''}" id="burnOverrideNote">✎ Overridden</span>
      </div>
    </div>

    ${capHtml}

    <div style="font-size:.79em;color:var(--muted);margin-bottom:10px;">
      High limit: <strong style="color:var(--red)">${site.highLevel} m³</strong> ·
      Safe zone: <strong style="color:var(--teal)">${site.safeLow}–${site.safeHigh} m³</strong> ·
      Capacity: <strong style="color:var(--text)">${site.absMax} m³</strong> ·
      ✓ actual · 📋 planned · red line = high limit
    </div>

    <table class="hour-table">
      <thead>
        <tr>
          <th>Hour</th><th>Level (m³)</th><th>% Full</th><th>Δ Change</th>
          <th>Fill Bar</th><th>Action</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>`;
}

// ── Burn rate input handlers ─────────────────────────
function syncBurnDay(hrVal) {
  const hrInput = document.getElementById("brDayInput");
  if (hrInput) hrInput.value = (parseFloat(hrVal)*24).toFixed(1);
}
function syncBurnHr(dayVal) {
  const hrInput = document.getElementById("brHrInput");
  if (hrInput) hrInput.value = (parseFloat(dayVal)/24).toFixed(2);
}
function onBurnHrChange(val) {
  const rate = parseFloat(val);
  if (!isNaN(rate) && rate >= 0) setBurnRate(activeSite, selectedDate, rate);
}
function onBurnDayChange(val) {
  const rate = parseFloat(val)/24;
  if (!isNaN(rate) && rate >= 0) setBurnRate(activeSite, selectedDate, rate);
}
function resetBurnRate(dl) {
  setBurnRate(activeSite, dl, null);
}

// ── Actions ──────────────────────────────────────────
function selectSite(key) {
  activeSite = key;
  selectedDate = TODAY;
  weekStart = Math.max(0, TODAY_IDX-3);
  renderAll();
}
function selectDate(dl) {
  selectedDate = dl;
  renderAll();
  setTimeout(()=>document.getElementById("detailPanel").scrollIntoView({behavior:"smooth",block:"nearest"}),50);
}
function shiftWeek(dir) {
  weekStart = Math.max(0, Math.min(MONTH_DATES.length-7, weekStart+dir*7));
  renderAll();
}
function clearPlanned() {
  if (confirm("Clear all planned loads for " + activeSite + "?")) {
    plannedLoads[activeSite] = {};
    plannedDrivers[activeSite] = {};
    renderAll();
  }
}
function exportCSV() {
  const site = SITES[activeSite];
  let csv = "Date,Hour,Level m3,% Full,Burn Rate m3/hr,Planned Load m3,Historical Load m3\n";
  for (const dl of MONTH_DATES) {
    const br = getBurnRate(activeSite, dl);
    for (let hr = 0; hr < 24; hr++) {
      const lv = getLevelAt(activeSite, dl, hr);
      const plan = (getPlanLoads(activeSite,dl)[hr])||"";
      const hist = (getHistLoads(activeSite,dl)[hr])||"";
      const pctFull = lv!==null ? (lv/site.absMax*100).toFixed(1) : "";
      csv += `${dl},${String(hr).padStart(2,'0')}:00,${lv!==null?lv.toFixed(1):''},${pctFull},${br.toFixed(2)},${plan},${hist}\n`;
    }
  }
  const blob = new Blob([csv],{type:"text/csv"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "Butane_Schedule_" + activeSite + ".csv";
  a.click();
}

function renderAll() {
  renderSiteTabs();
  renderLegend();
  renderSummary();
  renderWeekNav();
  renderDayGrid();
  renderDetailPanel();
}

// ── Init ──────────────────────────────────────────────
weekStart = Math.max(0, TODAY_IDX-3);
renderAll();
</script>
</body>
</html>
